<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tytravel-nomad/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1208" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5ede0"  media="(prefers-color-scheme: light)" />
    <meta name="description" content="TyTravel — Organisez vos voyages facilement" />
    <title>TyTravel-Nomad</title>

    <!-- PWA -->
    <link rel="manifest" href="/tytravel-nomad/manifest.json" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TyTravel" />
    <link rel="apple-touch-icon" href="/tytravel-nomad/icon-192.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Applique le thème AVANT le rendu React (évite le flash blanc sur mobile) -->
    <script>
      (function () {
        const stored = localStorage.getItem('tytravel-nomad-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>
    <script type="module" crossorigin src="/tytravel-nomad/assets/index-BfO_BXKl.js"></script>
    <link rel="stylesheet" crossorigin href="/tytravel-nomad/assets/index-3YMuqqjh.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
