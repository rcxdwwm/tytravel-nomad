<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/tytravel-nomad/favicon.svg" />

    <!-- viewport-fit=cover est INDISPENSABLE pour le plein écran iOS -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="description" content="TyTravel Nomad — Organisez vos voyages facilement" />

    <!-- Empêcher le cache agressif -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- PWA Fullscreen Android + iOS -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TyTravel" />

    <!-- Theme colors -->
    <meta name="theme-color" content="#1a1208" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f5ede0" media="(prefers-color-scheme: light)" />

    <!-- Apple Touch Icon + Manifest -->
    <link rel="apple-touch-icon" href="/tytravel-nomad/icon-192.png" />
    <link rel="manifest" href="/tytravel-nomad/manifest.json" />

    <title>TyTravel Nomad</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <!-- Thème avant rendu React (évite le flash) -->
    <script>
      (function () {
        const stored = localStorage.getItem('tytravel-nomad-theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- iOS Fullscreen styles -->
    <style>
      html {
        height: 100%;
      }
      body {
        min-height: 100%;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        min-height: 100%;
      }
      @media all and (display-mode: standalone) {
        html, body, #root {
          height: 100%;
          overflow: hidden;
        }
        #root {
          overflow-y: auto;
        }
      }
    </style>
    <script type="module" crossorigin src="/tytravel-nomad/assets/index-DcYZ3SNW.js"></script>
    <link rel="stylesheet" crossorigin href="/tytravel-nomad/assets/index-BAZvQxvW.css">
  </head>
  <body>
    <!-- Redirect script pour GitHub Pages SPA -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <div id="root"></div>
  </body>
</html>
